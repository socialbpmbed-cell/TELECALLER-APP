services:
  telecaller-app:
    build: .
    env_file: .env
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.telecaller.rule=Host(`telecallerapp.duckdns.org`)"
      - "traefik.http.routers.telecaller.entrypoints=websecure"
      - "traefik.http.routers.telecaller.tls.certresolver=letsencrypt"
      - "traefik.http.services.telecaller.loadbalancer.server.port=3000"
    networks:
      - n8n-bqrh_default

networks:
  n8n-bqrh_default:
    external: true
